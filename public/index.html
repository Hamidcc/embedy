<!DOCTYPE html>
<html>
<head>
  <title>GIF Upload</title>
</head>
<body>
  <h1>Upload GIF</h1>

  <form id="form">
    <input type="file" id="single" accept="image/gif" />
<input type="file" id="folder" webkitdirectory multiple />
    <button>Upload</button>
  </form>

  <p id="out"></p>

<script>
const form = document.getElementById('form')
const out = document.getElementById('out')

form.onsubmit = async (e) => {
  e.preventDefault()

  const single = document.getElementById('single').files
  const folder = document.getElementById('folder').files

  const files = folder.length ? folder : single

  if (!files.length) {
    out.textContent = 'No files selected'
    return
  }

  let uploaded = []

  for (const file of files) {
    if (!file.name.toLowerCase().endsWith('.gif')) continue

    const fd = new FormData()
    fd.append('file', file, file.name)

    const res = await fetch('/.netlify/functions/upload', {
      method: 'POST',
      body: fd
    })

    const text = await res.text()

    try {
      const data = JSON.parse(text)
      if (data.files) uploaded.push(...data.files)
    } catch {
      console.error(text)
    }
  }

  out.innerHTML = `
    Uploaded: ${uploaded.length}<br>
    ${uploaded.map(f => `<a href="${f}" target="_blank">${f}</a>`).join('<br>')}
  `
}
</script>
</body>
</html>
