<!DOCTYPE html>
<html>
<head><title>GIF Upload</title></head>
<body>
  <h1>Upload GIF</h1>

  <form id="form">
    <input type="file" id="single" accept="image/gif" multiple />
    <input type="file" id="folder" webkitdirectory multiple />
    <button>Upload</button>
  </form>

  <p id="out"></p>

<script>
const form = document.getElementById('form')
const out = document.getElementById('out')

form.onsubmit = async (e) => {
  e.preventDefault()

  const single = Array.from(document.getElementById('single').files || [])
  const folder = Array.from(document.getElementById('folder').files || [])
  const files = (folder.length ? folder : single).filter(f => f.name.toLowerCase().endsWith('.gif'))

  if (!files.length) {
    out.textContent = 'No GIF files selected'
    return
  }

  const fd = new FormData()
  for (const file of files) fd.append('file', file, file.name)

  // If your site is same-origin, this is fine. If cross-origin, use full URL and ensure CORS enabled server-side.
  const res = await fetch('/.netlify/functions/upload', {
    method: 'POST',
    body: fd,
    // do NOT set Content-Type manually — the browser will add the correct multipart boundary
    // credentials: 'same-origin' // uncomment if you need cookies auth
  })

  const text = await res.text()
  try {
    const data = JSON.parse(text)
    const uploaded = data.files || []
    out.innerHTML = `Uploaded: ${uploaded.length}<br>${uploaded.map(f => `<a href="${f}" target="_blank">${f}</a>`).join('<br>')}`
  } catch (err) {
    console.error('Server response (not JSON):', text)
    out.textContent = 'Upload failed — check console for server response'
  }
}
</script>
</body>
</html>
